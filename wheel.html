<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>عجلة الحظ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #1a1a2e; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        h1 { color: #4ecca3; text-shadow: 0 0 10px rgba(78, 204, 163, 0.5); }
        #wheel-container { position: relative; width: 300px; height: 300px; margin: 20px auto; }
        canvas { width: 100%; height: 100%; border-radius: 50%; box-shadow: 0 0 20px rgba(78, 204, 163, 0.3); }
        #pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid #ff6b6b; z-index: 10; filter: drop-shadow(0 0 5px rgba(0,0,0,0.5)); }
        button { background: #4ecca3; border: none; padding: 15px 40px; border-radius: 50px; color: #1a1a2e; font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 0 5px 15px rgba(78, 204, 163, 0.4); transition: transform 0.2s; }
        button:active { transform: scale(0.95); }
        button:disabled { background: #555; cursor: not-allowed; box-shadow: none; }
        #status { margin-top: 15px; font-size: 20px; font-weight: bold; min-height: 30px; }
        .win { color: #ffd93d; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <h1>🎡 عجلة الحظ</h1>
    <div id="wheel-container">
        <div id="pointer"></div>
        <canvas id="wheel" width="300" height="300"></canvas>
    </div>
    <div id="status">اضغط لتبدأ اللعب</div>
    <button id="spinBtn" onclick="startSpin()">ابدأ الدوران</button>

    <script>
        // إعدادات العجلة (يجب أن تتطابق مع البوت)
        const segments = [
            { label: "10,000", value: 10000, color: "#e74c3c" },
            { label: "حظ أوفر", value: 0, color: "#7f8c8d" },
            { label: "5,000", value: 5000, color: "#3498db" },
            { label: "500", value: 500, color: "#9b59b6" },
            { label: "2,000", value: 2000, color: "#f1c40f" },
            { label: "حظ أوفر", value: 0, color: "#95a5a6" },
            { label: "1,000", value: 1000, color: "#2ecc71" },
            { label: "50,000", value: 50000, color: "#d35400" }
        ];

        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const statusDiv = document.getElementById('status');
        let startAngle = 0;
        let arc = Math.PI * 2 / segments.length;
        let spinTimeout = null;
        let spinAngleStart = 10;
        let spinTime = 0;
        let spinTimeTotal = 0;

        // رسم العجلة
        function drawWheel() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let outsideRadius = 145;
            let textRadius = 110;
            let insideRadius = 50;

            ctx.font = 'bold 14px Arial';
            
            for (let i = 0; i < segments.length; i++) {
                let angle = startAngle + i * arc;
                // filling segments
                ctx.fillStyle = segments[i].color;
                ctx.beginPath();
                ctx.arc(150, 150, outsideRadius, angle, angle + arc, false);
                ctx.arc(150, 150, insideRadius, angle + arc, angle, true);
                ctx.stroke();
                ctx.fill();

                // text
                ctx.fillStyle = "white";
                ctx.save();
                ctx.translate(150 + Math.cos(angle + arc / 2) * textRadius, 
                              150 + Math.sin(angle + arc / 2) * textRadius);
                ctx.rotate(angle + arc / 2);
                let text = segments[i].label;
                ctx.fillText(text, -ctx.measureText(text).width / 2, 0);
                ctx.restore();
            }
        }

        function spin() {
            spinAngleStart = Math.random() * 10 + 10;
            spinTime = 0;
            spinTimeTotal = Math.random() * 3000 + 4 * 1000;
            spinBtn.disabled = true;
            statusDiv.textContent = "جاري الدوران...";
            statusDiv.className = "";
            rotateWheel();
        }

        function rotateWheel() {
            spinTime += 30;
            if (spinTime >= spinTimeTotal) {
                stopRotateWheel();
                return;
            }
            let spinAngle = spinAngleStart - easeOut(spinTime, 0, spinAngleStart, spinTimeTotal);
            startAngle += (spinAngle * Math.PI / 180);
            drawWheel();
            spinTimeout = requestAnimationFrame(rotateWheel);
        }

        function stopRotateWheel() {
            spinBtn.disabled = false;
            let degrees = startAngle * 180 / Math.PI + 90;
            let arcd = arc * 180 / Math.PI;
            let index = Math.floor((360 - degrees % 360) / arcd);
            ctx.save();
            
            let prize = segments[index];
            statusDiv.innerHTML = "🎉 ربحت: " + prize.label;
            statusDiv.className = "win";

            // إرسال البيانات للبوت
            // تنسيق: "spin,قيمة_الجائزة"
            let dataToSend = "spin," + prize.value;
            Telegram.WebApp.sendData(dataToSend);
            
            drawWheel();
        }

        function easeOut(t, b, c, d) {
            let ts = (t /= d) * t;
            let tc = ts * t;
            return b + c * (tc + -3 * ts + 3 * t);
        }

        function startSpin() {
            if (Telegram.WebApp) {
                // إرسال البيانات سيقوم بإغلاق التطبيق تلقائياً وإرسال البيانات للبوت
                spin(); 
            } else {
                spin(); // للتجربة بدون تيليجرام
            }
        }

        drawWheel();
        
        // تهيئة Telegram WebApp
        if (Telegram.WebApp) {
            Telegram.WebApp.expand();
            Telegram.WebApp.MainButton.hide();
        }
    </script>
</body>
</html>
